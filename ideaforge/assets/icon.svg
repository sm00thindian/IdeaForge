<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="IdeaForge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- subtle forge anvil silhouette -->
  <path
    d="M96 360h320l-28 44c-8 12-22 20-38 20H162c-16 0-30-8-38-20l-28-44z"
    fill="#312e81"
    opacity="0.55"
  />

  <!-- audio waveform bars -->
  <g fill="url(#wave)" opacity="0.95">
    <rect x="148" y="248" width="36" height="96" rx="18"/>
    <rect x="208" y="208" width="36" height="136" rx="18"/>
    <rect x="268" y="168" width="36" height="176" rx="18"/>
    <rect x="328" y="228" width="36" height="116" rx="18"/>
  </g>

  <!-- microphone body -->
  <g fill="#e2e8f0">
    <rect x="214" y="132" width="84" height="132" rx="42"/>
    <path d="M186 248a70 70 0 0 0 140 0" fill="none" stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>
    <rect x="248" y="300" width="16" height="52" rx="8"/>
    <rect x="220" y="344" width="72" height="18" rx="9"/>
  </g>

  <!-- mic grille -->
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round" opacity="0.85">
    <line x1="236" y1="168" x2="276" y2="168"/>
    <line x1="236" y1="192" x2="276" y2="192"/>
    <line x1="236" y1="216" x2="276" y2="216"/>
    <line x1="236" y1="240" x2="276" y2="240"/>
  </g>

  <!-- forge spark -->
  <g filter="url(#glow)" transform="translate(352 108)">
    <path
      d="M0 -34 L9 -9 L34 0 L9 9 L0 34 L-9 9 L-34 0 L-9 -9 Z"
      fill="url(#spark)"
    />
    <circle cx="0" cy="0" r="10" fill="#fff7ed" opacity="0.9"/>
  </g>
</svg>